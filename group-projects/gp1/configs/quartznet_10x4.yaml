defaults: [base]

model:
  name: quartznet_10x4
  d_model: 256
  dropout: 0.1

train:
  optimizer:
    name: novograd
    lr: 0.015
    betas: [0.95, 0.5]
    weight_decay: 1.0e-3
  scheduler:
    name: cosine
    warmup_steps: 5000
  grad_accum: 2
  fp16_autocast: true
  max_epochs: 100
  early_stop_patience: 15
  early_stop_metric: max_speaker_cer
