defaults: [base]

model:
  name: fast_conformer_bpe
  d_model: 96
  n_blocks: 16
  n_heads: 4
  ff_ratio: 4
  conv_kernel: 9
  dropout: 0.1
  vocab_size: 256  # BPE-256
  subsample_factor: 4  # s=8 forbidden — CTC breaks on GP1 worst-case; see CONTRACTS.md §5

text:
  vocab_type: bpe
  bpe_model_path: data/bpe/numbers_bpe256.model
  bpe_vocab_size: 256

train:
  optimizer:
    name: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-6
  scheduler:
    name: noam
    warmup_steps: 10000
  grad_accum: 2
  fp16_autocast: true
  max_epochs: 150
  early_stop_patience: 15
  early_stop_metric: max_speaker_cer
