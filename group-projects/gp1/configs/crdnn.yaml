defaults: [base]

model:
  name: crdnn
  d_cnn: 64
  rnn_hidden: 256
  rnn_layers: 2
  dropout: 0.15
  subsample_factor: 1

train:
  optimizer:
    name: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-6
  scheduler:
    name: cosine
    warmup_steps: 2000
  grad_accum: 2
  fp16_autocast: true
  max_epochs: 100
  early_stop_patience: 15
  early_stop_metric: max_speaker_cer
